<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euroformac - Asistente Virtual de Formación</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Montserrat:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <meta name="description"
        content="Resuelve tus dudas sobre cualquier curso de Euroformac con nuestro asistente virtual inteligente">
</head>

<body>
    <main class="chat-container">
        <div class="chat-header">
            <h2>📚 Asistente Virtual de Formación Euroformac</h2>
        </div>
        <div class="chat-box" id="chat-window">
            <!-- Messages will be appended here -->
            <div class="message bot-message">
                <div>
                    <p>¡Hola! 👋</p>
                    <p>Soy el Asistente Virtual de Formación de Euroformac. Puedes preguntarme cualquier duda sobre el
                        contenido de tus cursos.</p>
                    <p>¿En qué puedo ayudarte hoy? 😊</p>
                </div>
            </div>
        </div>
        <div class="chat-input-area">
            <form id="message-form" class="message-form">
                <input type="text" id="message-input" placeholder="Pregúntame sobre cualquier curso de Euroformac..."
                    autocomplete="off">
                <button type="submit" id="send-button" title="Enviar mensaje">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="24"
                        height="24">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                    </svg>
                </button>
                <button type="button" id="stop-button" title="Detener la respuesta" style="display: none;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    </svg>
                </button>
            </form>
        </div>
    </main>

    <script src="/static/js/main.js"></script>
</body>

</html>
